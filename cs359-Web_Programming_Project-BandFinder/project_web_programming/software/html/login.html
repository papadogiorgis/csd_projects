<!-- html/login.html -->
 
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Login Page">
        <meta name="keywords" content="login, user, band, Papadakis, Georgios">
        <meta name="author" content="Papadakis Georgios">
        <title>Login Page</title>
        <link rel="stylesheet" href="../css/styles.css">
    </head>

    <body>
        <header>
            <h1>Sign in Page</h1>
        </header>

        <form id="login-form" class="form-selection active">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" required>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required>
            </div>

            <div id="submission-message" class="submission-message"></div>

            <button type="submit" class="submit-btn">Login</button>
            <p style="text-align: center; margin-top: 20px;">No account? 
                <a href="index.html">Create one!</a></p>
        </form>

        <script src="../js/main.js" type="module"></script>
    </body>
</html>
