<!-- html/admin_login.html -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Admin Login Page">
        <meta name="keywords" content="login, admin, Papadakis, Georgios">
        <meta name="author" content="Papadakis Georgios">
        <title>Admin Login Page</title>
        <link rel="stylesheet" href="../css/styles.css">
        <style>
            body {background-color: black; color: white;}
            .admin-form {background-color: #222; padding: 40px; border-radius: 25px; border: 2px solid white;}
            .admin-form label {color: white;}
            .admin-form input {background-color: white; color: black; border-color: #222;}
        </style>
    </head>

    <body>
        <header>
            <h1>Admin Login Page</h1>
        </header>

        <div style="display:flex; justify-content:center;">
            <form id="admin-login-form" class="admin-form">
                <div class="form-group">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div id="admin-message" class="submission-message"></div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </div>

        <script>
            document.getElementById('admin-login-form').addEventListener('submit', async(e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                try{
                    const response = await fetch('http://localhost:3000/admin/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    const json = await response.json();
                    const msgDiv = document.getElementById('admin-message');
                    msgDiv.style.display = 'block';
                    if(response.status === 200){
                        msgDiv.className = 'submission-message success';
                        msgDiv.textContent = 'Login Successful!';
                        setTimeout(() => window.location.href = 'admin_dashboard.html', 2000);
                    }else{
                        msgDiv.className = 'submission-message error';
                        msgDiv.textContent = json.message;
                    }
                }catch (err){
                    console.error(err);
                }
            });
        </script>
    </body>
</html>
